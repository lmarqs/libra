<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Libra</title>
  <style>
    :root { --ok:#3ddc84; --warn:#ffcc00; --bad:#ff4d4d; --ink:#e8f0ff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; overflow: hidden; }
    #cam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #111; }

    /* OSD overlay — telemetry drawn on top of the video, like a pilot's HUD. */
    .osd { position: fixed; inset: 0; pointer-events: none; padding: 14px;
      text-shadow: 0 0 4px #000, 0 0 8px #000; }
    .corner { position: absolute; }
    .tl { top: 12px; left: 14px; }
    .tr { top: 12px; right: 14px; text-align: right; }
    .bl { bottom: 12px; left: 14px; }
    .angle { font-size: 13vw; font-weight: 700; line-height: 1; letter-spacing: -1px; }
    .angle small { font-size: .35em; opacity: .7; }
    .label { opacity: .65; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .val { font-size: 20px; font-weight: 600; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 6px; font-weight: 700;
      font-size: 18px; background: rgba(0,0,0,.45); }
    .status.on  { color: #04210f; background: var(--ok); }
    .status.off { color: var(--ink); background: rgba(255,255,255,.15); }
    .status.trip { color: #2a0000; background: var(--bad); }
    #plot { display: block; width: 46vw; max-width: 460px; height: 90px;
      background: rgba(0,0,0,.35); border-radius: 6px; }
    .bars { display: flex; gap: 8px; margin-top: 6px; }
    .bar { width: 14px; height: 70px; background: rgba(255,255,255,.15); border-radius: 4px;
      position: relative; overflow: hidden; }
    .bar > i { position: absolute; bottom: 0; left: 0; right: 0; background: var(--ok); }

    /* Control panel — the only interactive layer. */
    .panel { position: fixed; right: 14px; bottom: 14px; width: 300px; max-width: 84vw;
      background: rgba(12,16,24,.86); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 14px; display: none; }
    .panel.show { display: block; }
    .panel h2 { margin: 0 0 10px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; opacity: .8; }
    .row { display: grid; grid-template-columns: 34px 1fr 64px; align-items: center; gap: 8px; margin: 9px 0; }
    .row input[type=range] { width: 100%; }
    .row output { font-size: 13px; text-align: right; }
    button { font: inherit; font-weight: 700; border: 0; border-radius: 8px; padding: 10px 14px;
      cursor: pointer; width: 100%; }
    #enable { background: var(--ok); color: #04210f; }
    #enable.armed { background: var(--bad); color: #2a0000; }
    .gear { position: fixed; top: 12px; right: 50%; transform: translateX(50%);
      pointer-events: auto; background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.18);
      color: var(--ink); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <img id="cam" alt="camera stream" />

  <div class="osd">
    <div class="corner tl">
      <div class="label">tilt</div>
      <div class="angle"><span id="angle">0.0</span><small>°</small></div>
      <div class="label" style="margin-top:6px">setpoint <span id="sp" class="val" style="font-size:14px">0.0°</span></div>
    </div>
    <div class="corner tr">
      <div id="status" class="status off">DISARMED</div>
      <div style="margin-top:10px"><span class="label">output</span> <span id="out" class="val">0.000</span></div>
      <div class="bars" style="justify-content:flex-end">
        <div class="bar"><i id="bar1"></i></div>
        <div class="bar"><i id="bar2"></i></div>
      </div>
    </div>
    <div class="corner bl">
      <div class="label">angle (last few seconds)</div>
      <canvas id="plot" width="460" height="90"></canvas>
    </div>
  </div>

  <button class="gear" onclick="document.querySelector('.panel').classList.toggle('show')">⚙ tune</button>

  <div class="panel">
    <h2>PID tuning</h2>
    <div class="row"><label>Kp</label><input type="range" id="kp" min="0" max="0.1" step="0.0005"><output id="kpv"></output></div>
    <div class="row"><label>Ki</label><input type="range" id="ki" min="0" max="0.05" step="0.0005"><output id="kiv"></output></div>
    <div class="row"><label>Kd</label><input type="range" id="kd" min="0" max="0.01" step="0.0001"><output id="kdv"></output></div>
    <div class="row"><label>SP°</label><input type="range" id="sps" min="-20" max="20" step="0.5"><output id="spv"></output></div>
    <button id="enable">ENABLE</button>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    // The MJPEG stream lives on port 81 of the same host as this page.
    $('cam').src = `http://${location.hostname}:81/stream`;

    const hist = [];
    const plot = $('plot'), ctx = plot.getContext('2d');
    function drawPlot() {
      const w = plot.width, h = plot.height, mid = h / 2, span = 45; // ±45°
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();
      ctx.strokeStyle = '#3ddc84'; ctx.lineWidth = 2; ctx.beginPath();
      hist.forEach((a, i) => {
        const x = (i / (hist.length - 1 || 1)) * w;
        const y = mid - Math.max(-span, Math.min(span, a)) / span * mid;
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
    }

    // Slider id -> { telemetry key, output element id }.
    const SLIDERS = {
      kp:  { key: 'kp', out: 'kpv' },
      ki:  { key: 'ki', out: 'kiv' },
      kd:  { key: 'kd', out: 'kdv' },
      sps: { key: 'sp', out: 'spv' },
    };
    let dragging = false;
    function send(params) { fetch('/set?' + new URLSearchParams(params)); }
    for (const [id, { key, out }] of Object.entries(SLIDERS)) {
      const el = $(id), o = $(out);
      el.addEventListener('input', () => { o.value = el.value; dragging = true; });
      el.addEventListener('change', () => { send({ [key]: el.value }); dragging = false; });
    }

    let armed = false;
    $('enable').addEventListener('click', () => { armed = !armed; send({ enabled: armed ? 1 : 0 }); });

    async function poll() {
      try {
        const t = await (await fetch('/telemetry')).json();
        $('angle').textContent = t.angle.toFixed(1);
        $('sp').textContent = t.sp.toFixed(1) + '°';
        $('out').textContent = t.out.toFixed(3);
        $('bar1').style.height = Math.round(t.m1 * 100) + '%';
        $('bar2').style.height = Math.round(t.m2 * 100) + '%';

        const s = $('status');
        armed = t.enabled;
        if (t.tripped) { s.className = 'status trip'; s.textContent = 'TRIPPED'; }
        else if (t.enabled) { s.className = 'status on'; s.textContent = 'BALANCING'; }
        else { s.className = 'status off'; s.textContent = 'DISARMED'; }
        $('enable').textContent = t.enabled ? 'DISABLE' : 'ENABLE';
        $('enable').classList.toggle('armed', t.enabled);

        // Reflect the device's gains in the sliders, but don't fight a drag.
        if (!dragging) {
          for (const [id, { key, out }] of Object.entries(SLIDERS)) {
            $(id).value = t[key];
            $(out).value = t[key];
          }
        }

        hist.push(t.angle); if (hist.length > 150) hist.shift(); drawPlot();
      } catch (e) { /* transient drops are fine */ }
    }
    setInterval(poll, 100);
    poll();
  </script>
</body>
</html>
