<!doctype html>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Libra</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    background: #111;
    color: #eee
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 16px
  }

  h1 {
    font-size: 1.2rem;
    letter-spacing: .15em
  }

  #tel {
    font-family: ui-monospace, monospace;
    background: #1c1c1c;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px
  }

  #tel b {
    color: #7fd
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0
  }

  .row label {
    width: 3em;
    font-family: ui-monospace, monospace
  }

  .row input {
    flex: 1
  }

  .row output {
    width: 5.5em;
    text-align: right;
    font-family: ui-monospace, monospace
  }

  .warn {
    color: #f96;
    font-size: .8rem;
    margin-top: 18px
  }

  .tripped {
    color: #f55;
    font-weight: bold
  }

  .arm {
    display: flex;
    gap: 10px;
    margin: 14px 0
  }

  .arm button {
    flex: 1;
    padding: 14px;
    font-size: 1rem;
    border: 0;
    border-radius: 8px;
    color: #111;
    font-weight: bold
  }

  #armb {
    background: #5d5
  }

  #disb {
    background: #f96
  }
</style>
<div class=wrap>
  <h1>&#9878; LIBRA</h1>
  <div id=tel>connecting&hellip;</div>
  <div class=arm><button id=armb>ARM</button><button id=disb>DISARM</button></div>
  <div class=row><label>sp&deg;</label><input type=range id=sp min=-20 max=20 step=0.5><output id=spv></output></div>
  <div class=row><label>kp</label><input type=range id=kp min=0 max=0.05 step=0.001><output id=kpv></output></div>
  <div class=row><label>ki</label><input type=range id=ki min=0 max=0.01 step=0.0001><output id=kiv></output></div>
  <div class=row><label>kd</label><input type=range id=kd min=0 max=0.005 step=0.0001><output id=kdv></output></div>
  <div class=warn>ARM enables the control loop; ESC power is a separate hardware switch and the tilt failsafe still
    trips. On an open AP, anyone in range can arm &mdash; set a WPA2 password.</div>
</div>
<script>
  const $ = id => document.getElementById(id),
    inputs = ['sp', 'kp', 'ki', 'kd'];

  let drag = null;

  inputs.forEach((k) => {
    const el = $(k),
      o = $(k + 'v');

    el.addEventListener('input', () => {
      o.value = el.value;
      drag = k;
    });

    el.addEventListener('change', () => {
      fetch('/set?' + k + '=' + el.value);
      drag = null;
    });
  });

  $('armb').onclick = () => fetch('/set?en=1');

  $('disb').onclick = () => fetch('/set?en=0');

  async function poll() {
    try {
      const t = await (await fetch('/telemetry')).json();

      const st = t.bench ? '<span class=tripped>BENCH</span>' : (t.tripped ? '<span class=tripped>TRIPPED</span>' : (t.enabled ? '<b>ARMED</b>' : 'disarmed'));

      $('tel').innerHTML = 'angle <b>' + t.angle.toFixed(1) + '&deg;</b> &nbsp; ' + st;

      inputs.forEach(k => {
        if (drag !== k) {
          $(k).value = t[k];
          $(k + 'v').value = (+t[k]).toFixed(k == 'sp' ? 1 : 4);
        }
      });
    } catch (e) {
      $('tel').textContent = 'disconnected';
    }
  }

  setInterval(poll, 500);

  poll();
</script>
