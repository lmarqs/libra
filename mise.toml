[env]
_.file = ".env"
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.11"

[tasks."setup"]
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ ! -f ".env" ]; then
  cp .env.example .env
fi

pip install --quiet -r requirements.txt
"""

# Compile the default env (esp32-wroom32; see platformio.ini). Build/flash/monitor a
# specific board by passing the env through mise, e.g.
# `mise x -- pio run -e esp32-c3-super-mini` (the C3 has native USB; the WROOM-32
# uses a USB-UART bridge). `mise run build:all` compiles both boards.
[tasks."build"]
run = "pio run"

# Compile both embedded environments — the dual-arch gate (the control task's core
# selection differs on single-core C3 vs dual-core WROOM-32).
[tasks."build:all"]
run = "pio run -e esp32-wroom32 -e esp32-c3-super-mini"

[tasks."upload"]
run = "pio run -t upload"

[tasks."monitor"]
run = "pio device monitor"

[tasks."test"]
run = "pio test -e native"

[tasks."format"]
run = """
#!/usr/bin/env bash
set -euo pipefail

# Our C++ lives in src/, lib/, test/.
find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format -i
"""

[tasks."format-check"]
run = """
#!/usr/bin/env bash
set -euo pipefail

find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format --dry-run --Werror
"""

# build -> upload -> monitor, in order. Kept in a single `pio` invocation because
# mise runs `depends` in parallel, which would race upload against monitor for
# the serial port.
[tasks."run"]
run = "pio run -t upload -t monitor"

# Non-interactive serial debugging (see docs/testing.md). Unlike `monitor`, these
# are scriptable and reset the board cleanly. For custom args use the long form,
# e.g. `mise x -- python tools/serial_dbg.py stream --seconds 20 --grep gx=`.
[tasks."probe"]
run = "python tools/serial_dbg.py probe"  # send '?' and print the state line

[tasks."banner"]
run = "python tools/serial_dbg.py banner"  # reset + capture the boot banner

[tasks."stream"]
run = "python tools/serial_dbg.py stream"  # capture serial for 30s (e.g. the IMU debug stream)

# Fine ESC throttle sweep for bench/calibration — PROPS OFF, needs a LIBRA_BENCH_ENABLED=1
# build. Defaults to 0..0.10 on both motors; for a custom range/motor use the long form, e.g.
# `mise x -- python tools/sweep.py 0.07 0.10 0.001 2 --motor seq` (see docs/testing.md).
[tasks."sweep"]
run = "python tools/sweep.py"  # ramp throttle, holding each step so you can watch the motor

# Embed assets into the firmware: each file under assets/ (e.g. the web UI's
# index.html) becomes a PROGMEM byte array in assets/<file>.h, so it ships in
# flash with no on-device filesystem. Re-run after editing an asset; the
# generated *.h are skipped, so re-runs are idempotent. Optional arg overrides
# the directory: `mise run hexdump -- some/dir`.
[tasks."hexdump"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

dir="${1:-assets}"
[[ -d "$dir" ]] || { echo "hexdump: no '$dir/' directory — nothing to do" >&2; exit 0; }

count=0
# -print0 + read -d '' so filenames with spaces survive; sort for stable diffs.
while IFS= read -r -d '' src; do
  rel="${src#"$dir"/}"
  out="$src.h"
  len="$(wc -c < "$src")"
  # Sanitize to a valid C identifier: non-alnum -> '_', prefix any leading digit.
  sym="$(printf '%s' "$rel" | sed 's/[^A-Za-z0-9]/_/g')"
  [[ "$sym" == [0-9]* ]] && sym="_$sym"
  {
    echo "// Auto-generated from ${src} by 'mise run hexdump' — do not edit."
    echo "#pragma once"
    # xxd -i emits the byte array + a _len; sed makes both const and marks the
    # array PROGMEM so it lives in flash. Not NUL-terminated — serve with _len.
    xxd -i -n "$sym" "$src" |
      sed -e "s/^unsigned char ${sym}\\[\\] = {\$/const unsigned char ${sym}[] PROGMEM = {/" \
          -e "s/^unsigned int ${sym}_len = /const unsigned int ${sym}_len = /"
  } > "$out"
  echo "hexdump: ${src} -> ${out} (${len} bytes, symbol ${sym})"
  count=$((count + 1))
done < <(find "$dir" -type f -not -name '*.h' -print0 | sort -z)

echo "hexdump: generated ${count} header(s)"
'''
