[env]
_.file = ".env"
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.11"

[tasks."setup"]
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ ! -f ".env" ]; then
  cp .env.example .env
fi

pip install --quiet -r requirements.txt
"""

# Compile the default env (esp32-wroom32; see platformio.ini). Build/flash/monitor a
# specific board by passing the env through mise, e.g.
# `mise x -- pio run -e esp32-c3-super-mini` (the C3 has native USB; the WROOM-32
# uses a USB-UART bridge). `mise run build:all` compiles both boards.
[tasks."build"]
run = "pio run"

# Compile both embedded environments — the dual-arch gate (the control task's core
# selection differs on single-core C3 vs dual-core WROOM-32).
[tasks."build:all"]
run = "pio run -e esp32-wroom32 -e esp32-c3-super-mini"

[tasks."upload"]
run = "pio run -t upload"

[tasks."monitor"]
run = "pio device monitor"

[tasks."test"]
run = "pio test -e native"

[tasks."format"]
run = """
#!/usr/bin/env bash
set -euo pipefail

# Our C++ lives in src/, lib/, test/.
find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format -i
"""

[tasks."format-check"]
run = """
#!/usr/bin/env bash
set -euo pipefail

find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format --dry-run --Werror
"""

# build -> upload -> monitor, in order. Kept in a single `pio` invocation because
# mise runs `depends` in parallel, which would race upload against monitor for
# the serial port.
[tasks."run"]
run = "pio run -t upload -t monitor"

# Non-interactive serial debugging (see docs/testing.md). Unlike `monitor`, these
# are scriptable and reset the board cleanly. For custom args use the long form,
# e.g. `mise x -- python tools/serial_dbg.py stream --seconds 20 --grep gx=`.
[tasks."probe"]
run = "python tools/serial_dbg.py probe"  # send '?' and print the state line

[tasks."banner"]
run = "python tools/serial_dbg.py banner"  # reset + capture the boot banner

[tasks."stream"]
run = "python tools/serial_dbg.py stream"  # capture serial for 30s (e.g. the IMU debug stream)
