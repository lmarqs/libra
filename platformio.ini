; Libra — ESP32-C3 self-balancing beam (a hands-on PID experiment).
; The MCU sits at the beam's pivot and runs a PID loop that balances it;
; tuning + telemetry are over the USB serial console.
; Variables come from .env, loaded by mise and injected via ${sysenv.*}.
; Always build through mise (`mise run build`) so the env vars are set.

[platformio]
default_envs = esp32-c3-super-mini

; Shared by every embedded environment.
[common]
framework = arduino
monitor_speed = 115200
; Unit tests are host-only; never collect them for the embedded board.
test_ignore = *

; --- ESP32-C3 Super Mini — the primary (and only) board ---
; Single-core RISC-V with native USB; flashed + monitored straight over the USB
; port (no external adapter). USB-CDC-on-boot routes Serial to that USB port.
[env:esp32-c3-super-mini]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
build_flags =
    ; Route Serial over the native USB port (no UART adapter needed).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Safety cap on per-motor throttle, from .env (mise injects it). Defaults to
    ; 0.05 (5%) via .env / src/config.h; lower it to test more conservatively.
    -DLIBRA_THROTTLE_MAX=${sysenv.LIBRA_THROTTLE_MAX}
lib_deps =
    madhephaestus/ESP32Servo@^3.0.5

; Host unit tests (Unity). src/ is excluded; only lib/ + test/ compile, and the
; library dependency finder only pulls in the pure-logic libs the tests include
; (pid, filter, mixer) — the hardware libs (imu, esc) are never compiled here.
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
