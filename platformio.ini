; Libra — ESP32-C3 self-balancing beam (a hands-on PID experiment).
; The MCU sits at the beam's pivot and runs a PID loop that balances it;
; tuning + telemetry are over the USB serial console.
;
; Config split: the per-board PIN MAP lives here as literal -D flags (board
; hardware, same for everyone). Deployment TUNABLES (throttle, tilt, IMU trim,
; SSID, log level) come from .env via ${sysenv.*} (gitignored real values);
; src/config.h holds the flag-less defaults. Build through mise so .env is loaded.

[platformio]
default_envs = esp32-wroom32

; Shared by every embedded environment.
[common]
framework = arduino
monitor_speed = 115200
; Unit tests are host-only; never collect them for the embedded board.
test_ignore = *

; Tunables from .env (mise injects them); flag-less defaults live in src/config.h.
[tunables]
build_flags =
    -DLIBRA_THROTTLE_MAX=${sysenv.LIBRA_THROTTLE_MAX}
    -DLIBRA_TILT_LIMIT_DEG=${sysenv.LIBRA_TILT_LIMIT_DEG}
    -DLIBRA_ANGLE_OFFSET_DEG=${sysenv.LIBRA_ANGLE_OFFSET_DEG}
    -DLIBRA_AP_SSID='"${sysenv.LIBRA_AP_SSID}"'
    -DLIBRA_AP_PASS='"${sysenv.LIBRA_AP_PASS}"'
    -DCORE_DEBUG_LEVEL=${sysenv.LIBRA_LOG_LEVEL}

; --- ESP32-C3 Super Mini — single-core RISC-V with native USB; flashed +
; monitored straight over the USB port. USB-CDC-on-boot routes Serial there. ---
[env:esp32-c3-super-mini]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
build_flags =
    ${tunables.build_flags}
    ; Route Serial over the native USB port (no UART adapter needed).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Pin map (GPIO numbers) — C3 Super Mini silkscreen. GPIO2 (SDA) idles high,
    ; which is the level it wants at reset, so it is safe here.
    -DLIBRA_I2C_SDA=2
    -DLIBRA_I2C_SCL=3
    -DLIBRA_ESC_PIN1=0
    -DLIBRA_ESC_PIN2=1
lib_deps =
    madhephaestus/ESP32Servo@^3.0.5

; --- ESP32 WROOM-32 dev board — classic dual-core with a USB-UART bridge (flashed
; over /dev/ttyUSB*), a proper 3V3 regulator + PCB antenna. No native-USB flags —
; Serial runs over UART0 via the bridge. All pins are general-purpose with no boot
; strapping role (avoiding GPIO0/2/12/15): I2C on the adjacent SDA=32/SCL=33 header
; pair, ESCs on 25/26 right beside them. ---
[env:esp32-wroom32]
extends = common
platform = espressif32
board = esp32dev
build_flags =
    ${tunables.build_flags}
    -DLIBRA_I2C_SDA=32
    -DLIBRA_I2C_SCL=33
    -DLIBRA_ESC_PIN1=25
    -DLIBRA_ESC_PIN2=26
lib_deps =
    madhephaestus/ESP32Servo@^3.0.5

; Host unit tests (Unity). src/ is excluded; only lib/ + test/ compile, and the
; library dependency finder only pulls in the pure-logic libs the tests include
; (pid, filter, mixer) — the hardware libs (imu, esc) are never compiled here.
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
