; Libra — ESP32-CAM self-balancing beam (a hands-on PID experiment).
; The MCU sits at the beam's pivot; its camera gives an FPV view with a
; browser-rendered OSD, while a PID loop balances the beam.
; Variables come from .env, loaded by mise and injected via ${sysenv.*}.
; Always build through mise (`mise run build`) so the env vars are set.

[platformio]
default_envs = esp32cam

; Shared by every embedded environment.
[common]
framework = arduino
monitor_speed = 115200
; Unit tests are host-only; never collect them for the embedded board.
test_ignore = *

; --- AI-Thinker ESP32-CAM — the primary (and only) board ---
; Dual-core ESP32: the PID control loop is pinned to one core, the camera
; stream + web server run on the other. Flashed over an external USB-TTL/FTDI
; adapter (GPIO0 -> GND to enter the bootloader); logs over UART0.
[env:esp32cam]
extends = common
platform = espressif32
board = esp32cam
build_flags =
    -DBOARD_HAS_PSRAM
    ; The web UI's HTML is embedded as a PROGMEM header by `mise run hexdump`
    ; (assets/index.html -> assets/index.html.h); put assets/ on the include path.
    -Iassets
lib_deps =
    madhephaestus/ESP32Servo@^3.0.5

; Host unit tests (Unity). src/ is excluded; only lib/ + test/ compile, and the
; library dependency finder only pulls in the pure-logic libs the tests include
; (pid, filter, mixer) — the hardware libs (imu, esc, camera) are never compiled here.
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
